name: Deploy to Production (Coolify)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-coolify:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" --connect-timeout 10 --max-time 30 --retry 2 --retry-delay 5
